server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: shuaicoin_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: shuaicoin
          __path__: ./logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            user_id: user_id
      - labels:
          level:
          logger:
          user_id:
